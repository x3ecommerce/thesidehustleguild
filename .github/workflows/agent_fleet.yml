name: Agent Fleet Cron

# Fan-out scheduler. Each cron entry triggers the matching workflow_dispatch input.
# Cloudflare account is at the 5-cron limit; GitHub Actions handles all worker scheduling.

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Specific agent to run (or "all")'
        required: false
        default: 'all'
  schedule:
    # Hourly: f2_revenue
    - cron: '7 * * * *'
    # 04:00 ET / 08:00 UTC: c2_pricepool
    - cron: '0 8 * * *'
    # 06:00 ET / 10:00 UTC: f4_controller (slight offset from 0 6 to avoid overlap with daily recon)
    - cron: '0 10 * * *'
    # 07:00 ET / 11:00 UTC: f5_reporting
    - cron: '0 11 * * *'
    # 07:30 ET / 11:30 UTC: f1_cfo
    - cron: '30 11 * * *'
    # 09:00 ET / 13:00 UTC: c1_subcounter, f3_payouts
    - cron: '0 13 * * *'
    # 12:00 ET / 16:00 UTC Mon: f6_fpa
    - cron: '0 16 * * 1'
    # Every 15 min: a1_admin
    - cron: '*/15 * * * *'
    # Every 30 min: e1_role_grant, e2_concierge
    - cron: '5,35 * * * *'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Determine agents to run
        id: pick
        run: |
          set -euo pipefail
          MIN=$(date -u +%M)
          HR=$(date -u +%H)
          DOW=$(date -u +%u)   # 1..7 Mon..Sun

          # Always-running fleet (always include a1_admin if minute is :15/:30/:45/:00)
          RUN=""
          # admin every 15 (matches */15)
          if [ "$((10#$MIN % 15))" -eq 0 ]; then RUN+=" a1-admin"; fi
          # role grant + concierge at :05 and :35
          if [ "$MIN" = "05" ] || [ "$MIN" = "35" ]; then RUN+=" e1-role-grant e2-concierge"; fi
          # revenue at :07
          if [ "$MIN" = "07" ]; then RUN+=" f2-revenue"; fi
          # 08:00 UTC
          if [ "$HR" = "08" ] && [ "$MIN" = "00" ]; then RUN+=" c2-pricepool"; fi
          # 10:00 UTC
          if [ "$HR" = "10" ] && [ "$MIN" = "00" ]; then RUN+=" f4-controller"; fi
          # 11:00 UTC
          if [ "$HR" = "11" ] && [ "$MIN" = "00" ]; then RUN+=" f5-reporting"; fi
          # 11:30 UTC
          if [ "$HR" = "11" ] && [ "$MIN" = "30" ]; then RUN+=" f1-cfo"; fi
          # 13:00 UTC
          if [ "$HR" = "13" ] && [ "$MIN" = "00" ]; then RUN+=" c1-subcounter f3-payouts"; fi
          # Mondays 16:00 UTC
          if [ "$DOW" = "1" ] && [ "$HR" = "16" ] && [ "$MIN" = "00" ]; then RUN+=" f6-fpa"; fi

          # Manual override
          if [ "${{ inputs.agent }}" != "" ] && [ "${{ inputs.agent }}" != "all" ]; then
            RUN="${{ inputs.agent }}"
          fi
          if [ "${{ inputs.agent }}" = "all" ]; then
            RUN="f1-cfo f2-revenue f3-payouts f4-controller f5-reporting f6-fpa c1-subcounter c2-pricepool e1-role-grant e2-concierge a1-admin"
          fi
          echo "list=$RUN" >> $GITHUB_OUTPUT
          echo "Agents to run: $RUN"

      - name: Trigger each agent
        env:
          AGENT_RUN_TOKEN: ${{ secrets.AGENT_RUN_TOKEN }}
        run: |
          set -euo pipefail
          for a in ${{ steps.pick.outputs.list }}; do
            echo "→ shg-${a}.joshuakovarik.workers.dev/run"
            HTTP=$(curl -sS -A "SHG-cron/1.0 (github-actions)" -o /tmp/body -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $AGENT_RUN_TOKEN" \
              "https://shg-${a}.joshuakovarik.workers.dev/run" || echo "000")
            echo "  status: $HTTP"
            head -c 500 /tmp/body || true
            echo ""
            if [ "$HTTP" -ge 400 ] || [ "$HTTP" = "000" ]; then
              echo "::warning::shg-${a} returned $HTTP (continuing fleet)"
            fi
          done
