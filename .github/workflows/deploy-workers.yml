name: Deploy Workers to Cloudflare

# Deploys every shg-* Worker under /workers/ when its source or wrangler.toml
# changes. Workers were previously deployed manually via wrangler from a dev
# machine; this workflow closes that gap so code pushed to main reaches
# production automatically.

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Specific worker dir under workers/ (or "all")'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.list.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine workers to deploy
        id: list
        run: |
          set -euo pipefail
          MANUAL='${{ inputs.worker }}'
          if [ -n "$MANUAL" ] && [ "$MANUAL" != "all" ]; then
            echo "workers=[\"$MANUAL\"]" >> $GITHUB_OUTPUT
            echo "Manual single-worker deploy: $MANUAL"
            exit 0
          fi
          if [ "$MANUAL" = "all" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIRS=$(ls workers/ | grep -v '^_' | grep -v '^$' | sort)
          else
            # Auto: deploy only workers that changed in this push
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'workers/' | awk -F/ '{print $2}' | sort -u | grep -v '^_' | grep -v '^$' || true)
            if [ -z "$CHANGED" ]; then
              echo "No worker changes detected; nothing to deploy."
              echo "workers=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            DIRS="$CHANGED"
          fi
          JSON=$(echo "$DIRS" | python3 -c "import sys, json; print(json.dumps([l.strip() for l in sys.stdin if l.strip() and not l.strip().startswith('_')]))")
          echo "workers=$JSON" >> $GITHUB_OUTPUT
          echo "Workers to deploy: $JSON"

  deploy:
    needs: detect
    if: needs.detect.outputs.workers != '[]' && needs.detect.outputs.workers != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJson(needs.detect.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.worker }}
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ ! -f wrangler.toml ]; then
            echo "::warning::No wrangler.toml in workers/${{ matrix.worker }} — skipping"
            exit 0
          fi
          echo "→ Deploying workers/${{ matrix.worker }}"
          npx wrangler@3 deploy

      - name: Push AGENT_RUN_TOKEN secret
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AGENT_RUN_TOKEN: ${{ secrets.AGENT_RUN_TOKEN }}
        run: |
          if [ ! -f wrangler.toml ]; then exit 0; fi
          if [ -z "$AGENT_RUN_TOKEN" ]; then
            echo "::warning::AGENT_RUN_TOKEN not in GH secrets — skipping"
            exit 0
          fi
          echo "$AGENT_RUN_TOKEN" | npx wrangler@3 secret put AGENT_RUN_TOKEN
