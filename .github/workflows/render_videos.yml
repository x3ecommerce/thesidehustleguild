name: SHG Render Farm (HyperFrames)

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script ID to render (or "all")'
        required: true
        default: 'all'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        script:
          - shg_001_permission_slip
          - shg_002_the_counter
          - shg_003_pool_math
          - shg_004_three_things
          - shg_005_day_one
          - shg_006_sunday_reset
          - shg_007_founder_offer
          - shg_008_affiliate_math
          - shg_009_sponsor_pitch
          - shg_010_what_this_is_not
          - shg_011_champion_day
          - shg_012_quick_tour
          - shg_013_first_dollar
          - shg_014_form_demo
          - shg_015_origin_mission
          - shg_101_do_you_like_money
          - shg_102_built_a_side_hustle
          - shg_103_want_more_money
          - shg_104_tired_of_gurus
          - shg_105_get_paid_in_discord
    steps:
      - uses: actions/checkout@v4

      - name: Filter by input
        id: gate
        run: |
          if [ "${{ inputs.script }}" != "all" ] && [ "${{ inputs.script }}" != "${{ matrix.script }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node 20
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps (Chromium + FFmpeg + fonts)
        if: steps.gate.outputs.skip == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-liberation fonts-dejavu fonts-dejavu-core fonts-dejavu-extra \
            python3-pip \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libxshmfence1
          pip3 install --quiet Pillow Jinja2
          fc-cache -f

      - name: Pre-fetch HyperFrames + Chrome
        if: steps.gate.outputs.skip == 'false'
        run: |
          npx --yes hyperframes@0.5.4 doctor || true
          npx --yes hyperframes@0.5.4 browser ensure

      - name: Render via HyperFrames
        if: steps.gate.outputs.skip == 'false'
        id: render
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: shg-videos
          R2_PUBLIC_DOMAIN: pub-404744d3257c4094982b374d0827c547.r2.dev
          HYPERFRAMES_VERSION: '0.5.4'
        run: |
          cd cloud_render
          python3 render_hyperframes.py "scripts/${{ matrix.script }}.json"

      - name: Upload artifact (backup)
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.script }}
          path: /tmp/shg_render/${{ matrix.script }}/${{ matrix.script }}.mp4
          retention-days: 30

      - name: Upload render log on failure
        if: steps.gate.outputs.skip == 'false' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.script }}-log
          path: /tmp/shg_render/${{ matrix.script }}/hyperframes.log
          retention-days: 7

  manifest:
    needs: render
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate manifest
        env:
          R2_PUBLIC_DOMAIN: pub-404744d3257c4094982b374d0827c547.r2.dev
        run: |
          cat > manifest.json <<JSON
          {
            "rendered_at": "$(date -u +%FT%TZ)",
            "pipeline": "hyperframes@0.5.4",
            "videos": [
              "shg_001_permission_slip","shg_002_the_counter","shg_003_pool_math",
              "shg_004_three_things","shg_005_day_one","shg_006_sunday_reset",
              "shg_007_founder_offer","shg_008_affiliate_math","shg_009_sponsor_pitch",
              "shg_010_what_this_is_not","shg_011_champion_day","shg_012_quick_tour",
              "shg_013_first_dollar","shg_014_form_demo","shg_015_origin_mission"
            ],
            "base_url": "https://${R2_PUBLIC_DOMAIN}/"
          }
          JSON
          cat manifest.json
