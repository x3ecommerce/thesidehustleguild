name: Daily Reconciliation

on:
  schedule:
    # 07:00 UTC = 03:00 ET (matches the operating doc Section 6)
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    name: Trigger Worker /run
    steps:
      - name: Hit reconciliation Worker
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -w "\n%{http_code}" https://shg-reconcile.joshuakovarik.workers.dev/run)
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "status: $STATUS"
          echo "body: $BODY"
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Reconciliation Worker returned $STATUS"
            exit 1
          fi
          echo "Reconciliation completed at $(date -u +%FT%TZ)"
