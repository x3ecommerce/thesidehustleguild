name: Bootstrap Submissions Storage

# Creates R2 bucket + binds it to Pages project as SUBMISSIONS_BUCKET. Idempotent.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      BUCKET_NAME: shg-submissions
      PAGES_PROJECT: thesidehustleguild
      BINDING_NAME: SUBMISSIONS_BUCKET
    steps:
      - uses: actions/checkout@v4

      - name: Create R2 bucket (idempotent)
        run: |
          set -e
          STATUS=$(curl -sS -o /tmp/r2_create.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"$BUCKET_NAME\"}")
          echo "HTTP $STATUS"
          cat /tmp/r2_create.json | python3 -m json.tool || cat /tmp/r2_create.json

      - name: Fetch current Pages project
        run: |
          curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -o /tmp/pages_project.json
          python3 .github/scripts/show_pages_bindings.py /tmp/pages_project.json

      - name: Build PATCH payload
        run: |
          python3 .github/scripts/build_r2_patch.py \
            /tmp/pages_project.json "$BUCKET_NAME" "$BINDING_NAME" /tmp/patch.json
          echo "Patch bytes: $(wc -c < /tmp/patch.json)"

      - name: Apply PATCH to Pages project
        run: |
          STATUS=$(curl -sS -o /tmp/patch_resp.json -w "%{http_code}" -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/patch.json)
          echo "HTTP $STATUS"
          python3 -m json.tool < /tmp/patch_resp.json || cat /tmp/patch_resp.json

      - name: Verify binding
        run: |
          curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -o /tmp/verify.json
          python3 .github/scripts/verify_r2_binding.py /tmp/verify.json "$BINDING_NAME" "$BUCKET_NAME"
