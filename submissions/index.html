<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contest Submissions — The Side Hustle Guild</title>
<meta name="description" content="Every Hustle Card submitted to the SHG monthly contest. Sortable, filterable, public — see what members are actually building.">
<meta property="og:title" content="Submissions — The Side Hustle Guild">
<meta property="og:description" content="Every Hustle Card. Every cycle. Real revenue, real proof.">
<meta property="og:url" content="https://thesidehustleguild.com/submissions">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A961; --gold-light: #E5C982; --navy: #1a2238; --navy-light: #2a3553;
  --cream: #f8f4ee; --cream-dark: #ebe5d8; --charcoal: #2a2a2a; --muted: #8a8a8a; --border: #e0dac8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--charcoal); line-height: 1.5; }
.header { background: var(--navy); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Fraunces', serif; font-weight: 600; color: var(--gold); font-size: 1.1rem; text-decoration: none; }
.nav { display: flex; gap: 1.5rem; align-items: center; }
.nav a { color: var(--cream); text-decoration: none; font-size: 0.9rem; opacity: 0.85; }
.nav a.active { opacity: 1; color: var(--gold); }
.btn-cta { background: var(--gold); color: var(--navy); padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; font-size: 0.9rem; text-decoration: none; }
.hero { background: var(--navy); color: var(--cream); padding: 3rem 2rem; }
.hero-inner { max-width: 1080px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 2rem; flex-wrap: wrap; }
.hero-left h1 { font-family: 'Fraunces', serif; font-size: 2.4rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
.hero-left .sub { opacity: 0.85; font-size: 1rem; max-width: 480px; }
.hero-right { background: rgba(201,169,97,0.1); border: 1px solid rgba(201,169,97,0.4); padding: 1.25rem 1.75rem; border-radius: 12px; text-align: center; }
.hero-right .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 0.25rem; }
.hero-right .amount { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; color: var(--gold); line-height: 1; }
.hero-right .meta { font-size: 0.85rem; opacity: 0.8; margin-top: 0.4rem; }

.container { max-width: 1080px; margin: 0 auto; padding: 2rem; }
.filters { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; background: white; padding: 1rem 1.25rem; border-radius: 8px; border: 1px solid var(--border); }
.filter-group { display: flex; align-items: center; gap: 0.5rem; }
.filter-label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
.filter-select, .filter-search {
  font-family: 'Inter', sans-serif; font-size: 0.875rem;
  padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 6px;
  background: var(--cream); cursor: pointer;
}
.filter-search { flex: 1; min-width: 200px; cursor: text; }
.results-count { font-size: 0.85rem; color: var(--muted); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
.card { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: all 0.2s ease; position: relative; text-decoration: none; color: inherit; display: block; }
.card:hover { border-color: var(--gold); box-shadow: 0 8px 24px rgba(26,34,56,0.1); transform: translateY(-3px); }
.card.winner { border: 2px solid var(--gold); }
.card .winner-badge { position: absolute; top: 0.75rem; right: 0.75rem; background: var(--gold); color: var(--navy); font-size: 0.7rem; font-weight: 700; padding: 0.35rem 0.7rem; border-radius: 6px; letter-spacing: 0.05em; text-transform: uppercase; z-index: 2; box-shadow: 0 4px 12px rgba(26,34,56,0.2); }
.card .category-overlay { position: absolute; top: 0.75rem; left: 0.75rem; background: rgba(26,34,56,0.85); color: var(--gold); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; padding: 0.3rem 0.6rem; border-radius: 4px; z-index: 2; backdrop-filter: blur(8px); }
.card-image { aspect-ratio: 16/10; width: 100%; overflow: hidden; background: var(--cream-dark); display: flex; align-items: center; justify-content: center; }
.card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-image-placeholder { font-family: 'Fraunces', serif; color: var(--gold); font-size: 2rem; opacity: 0.4; }
.card-body { padding: 1.25rem 1.5rem 1.5rem; }
.card .title { font-family: 'Fraunces', serif; font-size: 1.15rem; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; line-height: 1.3; }
.card .meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.625rem; }
.card .avatar { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: inline-flex; align-items: center; justify-content: center; color: var(--navy); font-size: 0.7rem; font-weight: 700; }
.card .excerpt { font-size: 0.9rem; color: var(--charcoal); line-height: 1.5; margin-bottom: 1rem; opacity: 0.85; }
.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 0.875rem; border-top: 1px solid var(--cream-dark); }
.proof-stats { display: flex; gap: 0.875rem; font-size: 0.85rem; color: var(--charcoal); }
.proof-stats .stat strong { font-family: 'Fraunces', serif; color: var(--navy); }
.card-link { color: var(--gold); text-decoration: none; font-size: 0.85rem; font-weight: 500; }

.empty-card { background: transparent; border: 2px dashed var(--border); padding: 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 380px; }
.empty-card .label { font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 0.5rem; }
.empty-card .sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem; }
.empty-card .btn { background: var(--gold); color: var(--navy); padding: 0.625rem 1.25rem; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }

.empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-state h3 { font-family: 'Fraunces', serif; color: var(--navy); margin-bottom: 0.5rem; }
.empty-state .btn { display: inline-block; margin-top: 1rem; background: var(--gold); color: var(--navy); padding: 0.75rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 600; }

.loading { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.loading::after { content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--gold); animation: pulse 1.4s ease-in-out infinite; margin-left: 8px; vertical-align: middle; }
@keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="/">⚜ The Side Hustle Guild</a>
  <nav class="nav">
    <a href="/submissions/" class="active">Browse</a>
    <a href="/">Discord</a>
    <a class="btn-cta" href="/submit/">Submit your hustle →</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <h1 id="cycle-title">Loading…</h1>
      <p class="sub">Every Hustle Card from this month's contest. Updated live. Top three split the prize pool at month-end.</p>
    </div>
    <div class="hero-right">
      <div class="label">Current prize pool</div>
      <div class="amount" id="pool-amount">$—</div>
      <div class="meta" id="pool-meta">—</div>
    </div>
  </div>
</section>

<div class="container">

  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Category</span>
      <select class="filter-select" id="filter-category">
        <option value="">All</option>
        <option value="digital_product">Digital product</option>
        <option value="service">Service</option>
        <option value="saas_app">SaaS / app</option>
        <option value="content">Content</option>
        <option value="physical_product">Physical product</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <select class="filter-select" id="filter-sort">
        <option value="reactions">Most reactions</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>
    <input class="filter-search" id="filter-search" type="search" placeholder="Search titles, builders, tags…">
    <span class="results-count" id="results-count">—</span>
  </div>

  <div id="grid-wrap"><div class="loading">Loading submissions</div></div>

</div>

<script>
const $ = s => document.querySelector(s);
let allSubs = [];
const CATEGORY_LABEL = {
  digital_product: "Digital Product",
  service: "Service",
  saas_app: "SaaS / App",
  content: "Content",
  physical_product: "Physical Product",
  other: "Hustle"
};

function htmlEscape(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function formatDate(iso) {
  if (!iso) return "";
  try {
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  } catch { return ""; }
}

function renderCard(s) {
  const cat = CATEGORY_LABEL[s.category] || "Hustle";
  const initial = (s.display_name || "?")[0].toUpperCase();
  const excerpt = (s.outcome || s.problem || "").slice(0, 130);
  const isWinner = s.winner_rank != null;
  const winnerLabel = s.winner_rank === 1 ? "🏆 Winner" : s.winner_rank === 2 ? "🥈 2nd" : s.winner_rank === 3 ? "🥉 3rd" : "🏆 Leading";
  const heroImage = s.hero_url || null;

  return `
    <a class="card ${isWinner ? 'winner' : ''}" href="/submissions/${encodeURIComponent(s.slug)}">
      ${isWinner ? `<span class="winner-badge">${winnerLabel}</span>` : ''}
      <span class="category-overlay">${htmlEscape(cat)}</span>
      <div class="card-image">
        ${heroImage
          ? `<img src="${htmlEscape(heroImage)}" alt="${htmlEscape(s.title)}" loading="lazy">`
          : `<div class="card-image-placeholder">⚜</div>`}
      </div>
      <div class="card-body">
        <h2 class="title">${htmlEscape(s.title)}</h2>
        <div class="meta">
          <div class="avatar">${htmlEscape(initial)}</div>
          <span>${htmlEscape(s.display_name)} · ${formatDate(s.created_at)}</span>
        </div>
        <p class="excerpt">${htmlEscape(excerpt)}${excerpt.length === 130 ? "…" : ""}</p>
        <div class="card-footer">
          <div class="proof-stats">
            <span class="stat">⭐ <strong>${s.reaction_count || 0}</strong></span>
          </div>
          <span class="card-link">Read entry →</span>
        </div>
      </div>
    </a>`;
}

function renderEmptyCard(cycle) {
  return `
    <div class="empty-card">
      <div class="label">Got something to submit?</div>
      <div class="sub">${cycle} contest open. Top 3 split the pool.</div>
      <a class="btn" href="/submit/">Submit your hustle →</a>
    </div>`;
}

function applyFilters(subs) {
  const cat = $("#filter-category").value;
  const sort = $("#filter-sort").value;
  const search = $("#filter-search").value.toLowerCase().trim();

  let filtered = subs.slice();
  if (cat) filtered = filtered.filter(s => s.category === cat);
  if (search) {
    filtered = filtered.filter(s =>
      (s.title || "").toLowerCase().includes(search)
      || (s.display_name || "").toLowerCase().includes(search)
      || (s.target_audience || "").toLowerCase().includes(search)
    );
  }
  if (sort === "newest") filtered.sort((a,b) => (b.created_at||"").localeCompare(a.created_at||""));
  else if (sort === "oldest") filtered.sort((a,b) => (a.created_at||"").localeCompare(b.created_at||""));
  else filtered.sort((a,b) => (b.reaction_count||0) - (a.reaction_count||0));
  return filtered;
}

function render() {
  const filtered = applyFilters(allSubs);
  const cycle = allSubs[0]?.cycle_month || new Date().toISOString().slice(0,7);
  $("#results-count").textContent = `${filtered.length} ${filtered.length === 1 ? "entry" : "entries"}`;

  const grid = filtered.length
    ? filtered.map(renderCard).join("") + renderEmptyCard(cycle)
    : `<div class="empty-state" style="grid-column: 1 / -1;">
         <h3>No entries yet this cycle</h3>
         <p>Be the first to submit. Top 3 split the prize pool.</p>
         <a class="btn" href="/submit/">Submit your hustle →</a>
       </div>`;
  $("#grid-wrap").innerHTML = `<div class="grid">${grid}</div>`;
}

async function loadPool() {
  try {
    const r = await fetch("/api/public/stats");
    const d = await r.json();
    if (d?.prize_pool_cents != null) {
      $("#pool-amount").textContent = `$${(d.prize_pool_cents / 100).toFixed(0)}`;
    }
    if (d?.member_count != null) {
      $("#pool-meta").textContent = `${d.member_count} members`;
    }
  } catch (_) {}
}

async function loadSubs() {
  try {
    const r = await fetch("/api/submissions");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allSubs = data.submissions || [];

    // Update title
    const cycleMonth = data.cycle || new Date().toISOString().slice(0,7);
    const cycleDate = new Date(cycleMonth + "-01");
    const cycleLabel = cycleDate.toLocaleString("en-US", { month: "long", year: "numeric" });
    $("#cycle-title").textContent = `${cycleLabel} Submissions`;
    document.title = `${cycleLabel} Submissions — The Side Hustle Guild`;

    render();
  } catch (e) {
    $("#grid-wrap").innerHTML = `
      <div class="empty-state">
        <h3>Couldn't load submissions</h3>
        <p>${htmlEscape(e.message)}. Refresh in a moment.</p>
      </div>`;
  }
}

["#filter-category", "#filter-sort", "#filter-search"].forEach(sel => {
  document.querySelector(sel).addEventListener("input", render);
});

loadPool();
loadSubs();
</script>
</body>
</html>
