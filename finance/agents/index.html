<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Runs — SHG Finance</title>
<link href="https://fonts.bunny.net/css?family=fraunces:400,600,700|manrope:400,500,600,700" rel="stylesheet">
<style>
:root{--cream:#F8F4ED;--slate:#27384A;--sunrise:#E89B3B;--line:rgba(39,56,74,0.10);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Manrope,sans-serif;background:var(--cream);color:#1E1E1E;line-height:1.5}
.shell{max-width:1200px;margin:0 auto;padding:32px 24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{font-family:Fraunces,serif;font-size:32px;color:var(--slate)}
.nav{display:flex;gap:16px;font-size:14px}
.nav a{color:var(--slate);text-decoration:none;padding:8px 12px;border-radius:6px}
.nav a.active{background:var(--slate);color:var(--cream)}
.card{background:white;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 8px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:0.08em}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase}
.s-success{background:#E5F1DD;color:#2F5C1F}.s-warn{background:#FBE6BE;color:#7A4A0A}.s-error{background:#F8D6CF;color:#7C1B0E}.s-running{background:#E0E5EA;color:#27384A}
.errblock{background:#FBE9E5;color:#7C1B0E;padding:6px 8px;border-radius:6px;font-family:ui-monospace,Menlo,monospace;font-size:11px;white-space:pre-wrap;max-height:80px;overflow:auto}
select{padding:8px 12px;border:1px solid var(--line);border-radius:6px;font-family:Manrope,sans-serif;font-size:14px;background:white}
</style>
</head><body>
<div class="shell">
<header>
  <h1>Agent Runs</h1>
  <nav class="nav">
    <a href="/finance/">Overview</a>
    <a href="/finance/ledger/">Ledger</a>
    <a href="/finance/health/">Fleet</a>
    <a href="/finance/agents/" class="active">Runs</a>
    <a href="/finance/approvals/">Approvals</a>
    <a href="/finance/members/">Members</a>
    <a href="/finance/affiliates/">Affiliates</a>
  </nav>
</header>
<div class="card">
  <p>Filter: <select id="agent" onchange="render()"><option value="">All agents</option></select>
  <select id="status" onchange="render()"><option value="">All statuses</option><option>success</option><option>warn</option><option>error</option><option>running</option></select></p>
</div>
<div class="card"><table id="t"><thead><tr><th>Started</th><th>Agent</th><th>Status</th><th>Duration</th><th>Output</th><th>Error</th></tr></thead><tbody></tbody></table></div>
<script>
let cache = [];
async function load(){
  const r = await fetch('/api/finance/health', { credentials:'include' });
  if (r.status === 401){ location='/finance/login.html'; return; }
  const d = await r.json();
  cache = d.recent_runs || [];
  const agents = [...new Set(cache.map(r => r.agent_id))];
  document.getElementById('agent').innerHTML = '<option value="">All agents</option>' + agents.map(a=>`<option>${a}</option>`).join('');
  render();
}
function render(){
  const a = document.getElementById('agent').value, s = document.getElementById('status').value;
  const rows = cache.filter(r => (!a || r.agent_id===a) && (!s || r.status===s));
  document.querySelector('#t tbody').innerHTML = rows.map(r => `
    <tr>
      <td>${new Date(r.started_at).toLocaleString()}</td>
      <td><b>${r.agent_name}</b><div style="font-size:11px;color:rgba(39,56,74,0.6)">${r.agent_id}</div></td>
      <td><span class="pill s-${r.status}">${r.status}</span></td>
      <td>${r.duration_ms ? r.duration_ms+'ms' : '—'}</td>
      <td style="max-width:380px">${(r.output_summary||'').replace(/</g,'&lt;')}</td>
      <td>${r.error_message ? `<div class="errblock">${r.error_message.replace(/</g,'&lt;').slice(0,400)}</div>` : ''}</td>
    </tr>`).join('') || '<tr><td colspan=6>No runs yet</td></tr>';
}
load();
</script>
</body></html>
