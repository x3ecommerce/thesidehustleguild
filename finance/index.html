<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Overview · CFO Suite — The Side Hustle Guild</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=fraunces:400,500,600,700|manrope:400,500,600,700" rel="stylesheet">
<link rel="stylesheet" href="/finance/assets/cfo.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
<script src="/finance/assets/cfo.js" defer></script>
</head>
<body><script src="/assets/cookie-banner.js" defer></script>
</body>
<script>
window.addEventListener('DOMContentLoaded', function () {
  const body =
    '<h1 class="page-title">Morning brief</h1>' +
    '<div class="page-sub" id="page-sub">Loading…</div>' +
    '<div id="drift-banner" hidden></div>' +
    '<div class="kpi-strip" id="kpi"></div>' +
    '<div class="grid-2">' +
      '<div class="card"><h2>Revenue, last 90 days <span class="muted" style="font-weight:400">subscription · sponsor · prize</span></h2>' +
        '<div class="chart-wrap"><canvas id="chart-revenue" aria-label="90-day revenue stacked area"></canvas></div>' +
        '<div style="margin-top:10px;text-align:right;"><button class="btn ghost" id="dl-revenue" type="button">Download PNG</button></div>' +
      '</div>' +
      '<div class="card"><h2>MRR by tier</h2>' +
        '<div class="chart-wrap"><canvas id="chart-mrr" aria-label="MRR donut by tier"></canvas></div>' +
        '<div style="margin-top:10px;text-align:right;"><button class="btn ghost" id="dl-mrr" type="button">Download PNG</button></div>' +
      '</div>' +
    '</div>' +
    '<div class="grid-2">' +
      '<div class="card"><h2>Top affiliates by active refs</h2>' +
        '<div class="chart-wrap"><canvas id="chart-aff" aria-label="Top affiliates"></canvas></div>' +
        '<div style="margin-top:10px;text-align:right;"><button class="btn ghost" id="dl-aff" type="button">Download PNG</button></div>' +
      '</div>' +
      '<div class="card"><h2>Audit health timeline <span class="muted" style="font-weight:400">last 30 reconciliation runs</span></h2>' +
        '<div class="chart-wrap"><canvas id="chart-recon" aria-label="Audit health timeline"></canvas></div>' +
        '<div style="margin-top:10px;text-align:right;"><button class="btn ghost" id="dl-recon" type="button">Download PNG</button></div>' +
      '</div>' +
    '</div>' +
    '<div class="grid-2c-side">' +
      '<div class="tbl-wrap" id="recent-wrap">' +
        '<div class="tbl-toolbar"><div class="filters"><strong>Recent activity</strong></div><div class="exports" id="recent-exports"></div></div>' +
        '<div id="recent-table"></div>' +
      '</div>' +
      '<div class="card" id="approvals-card"><h2>Approvals queue</h2><div id="approvals-summary"></div><div style="margin-top:14px;"><a class="btn primary" href="/finance/approvals/">Open queue →</a></div></div>' +
    '</div>';
  CFO.renderShell('overview', { title: 'Overview', body: body });

  let lastData = null;
  const charts = {};

  async function load() {
    try {
      document.getElementById('page-sub').textContent = 'Refreshing…';
      const data = await CFO.api('/api/finance/overview');
      lastData = data;
      render(data);
      CFO.setLastRefresh(data.generated_at);
      const h = data.kpi.audit_health || 'YELLOW';
      const lbl = 'Audit health: ' + h + (data.last_reconciliation ? ' · ' + CFO.fmtRel(data.last_reconciliation.ran_at) : '');
      CFO.setAuditHealth(h.toLowerCase(), lbl);
      document.getElementById('page-sub').textContent =
        'Generated ' + CFO.fmtDate(data.generated_at) + ' · ' + (data.recent_activity || []).length + ' recent transactions';
    } catch (e) {
      const main = document.getElementById('cfo-page');
      const err = document.createElement('div');
      err.className = 'err-banner';
      err.textContent = 'Failed to load: ' + (e && e.message || e);
      main.prepend(err);
    }
  }
  window.cfoOnRefresh = load;

  function render(data) {
    // Drift banner
    const banner = document.getElementById('drift-banner');
    if (data.drift_alert) {
      banner.hidden = false;
      banner.className = 'err-banner';
      banner.style.display = 'flex';
      banner.style.justifyContent = 'space-between';
      banner.style.alignItems = 'center';
      banner.innerHTML = '<div><strong>DRIFT DETECTED</strong> — Run ' + CFO.escapeHtml(data.drift_alert.run_id)
        + ' · ' + CFO.fmtMoney(data.drift_alert.drift_cents) + ' (' + CFO.fmtPct(data.drift_alert.drift_pct, 2) + ') · '
        + CFO.fmtRel(data.drift_alert.ran_at) + '</div>'
        + '<a class="btn danger" href="/finance/audit/?action=reconciliation_run">Investigate →</a>';
    } else { banner.hidden = true; }

    // KPI strip
    const k = data.kpi || {};
    const health = (k.audit_health || 'YELLOW').toLowerCase();
    document.getElementById('kpi').innerHTML =
      kpiCard('MRR', CFO.fmtMoney(k.mrr_cents, { compact: true }), 'trailing 30 days') +
      kpiCard('Members today', (k.members_today_net >= 0 ? '+' : '') + k.members_today_net, '+' + k.members_today_new + ' new · -' + k.members_today_churned + ' churn') +
      kpiCard('Churn (mo)', CFO.fmtPct(k.churn_pct), 'as % of active') +
      kpiCard('Cash position', CFO.fmtMoney(k.cash_cents, { compact: true }), 'ledger total') +
      kpiCard('Audit', k.audit_health || '—', data.last_reconciliation ? 'last ' + CFO.fmtRel(data.last_reconciliation.ran_at) : 'no run yet', 'health ' + health + (health === 'red' ? ' pulse' : ''));

    // Recent activity table
    const recent = (data.recent_activity || []).map(function (r) {
      return Object.assign({}, r, { __display_amount: CFO.fmtMoney(r.amount_cents) });
    });
    CFO.renderTable({
      container: document.getElementById('recent-table'),
      columns: [
        { key: 'occurred_at', label: 'When', render: function (r) { return '<span data-iso="' + CFO.escapeHtml(r.occurred_at) + '">' + CFO.fmtRel(r.occurred_at) + '</span>'; } },
        { key: 'type', label: 'Type', render: function (r) { return '<span class="pill">' + CFO.escapeHtml(CFO.txnTypeLabel(r.type)) + '</span>'; } },
        { key: 'amount_cents', label: 'Amount', align: 'right', render: function (r) { return '<span class="' + (r.amount_cents >= 0 ? 'pos' : 'neg') + '">' + CFO.escapeHtml(CFO.fmtMoney(r.amount_cents)) + '</span>'; } },
        { key: 'discord_id', label: 'Member', render: function (r) { return r.discord_id ? CFO.escapeHtml(r.discord_id) : '<span class="mono">' + CFO.escapeHtml(r.whop_id || '—') + '</span>'; } },
        { key: 'source', label: 'Source', render: function (r) { return '<span class="pill">' + CFO.escapeHtml(r.source) + '</span>'; } }
      ],
      rows: recent,
      rowClick: function (r) { window.location.href = '/finance/ledger/detail.html?id=' + encodeURIComponent(r.txn_id); },
      emptyText: 'No recent transactions.'
    });
    const exportsEl = document.getElementById('recent-exports');
    exportsEl.innerHTML = '';
    CFO.attachExports(exportsEl,
      function () { return data.recent_activity || []; },
      function () { return ['When','Type','Amount (USD)','Member','Source','Txn ID']; },
      function () { return [
        function (r) { return r.occurred_at; },
        function (r) { return CFO.txnTypeLabel(r.type); },
        function (r) { return ((r.amount_cents || 0) / 100).toFixed(2); },
        function (r) { return r.discord_id || r.whop_id || ''; },
        function (r) { return r.source; },
        function (r) { return r.txn_id; }
      ]; },
      'shg-overview-recent');

    // Approvals summary
    const ap = data.approvals_summary || {};
    document.getElementById('approvals-summary').innerHTML =
      row('Payouts > $1K awaiting', ap.payouts_awaiting) +
      row('Contracts to sign', ap.contracts_awaiting) +
      row('W-9 missing payouts', ap.w9_blocked);

    // CHARTS — all rendered after Chart.js loads
    if (typeof Chart === 'undefined') {
      const t = setInterval(function () { if (typeof Chart !== 'undefined') { clearInterval(t); drawCharts(data); } }, 80);
    } else { drawCharts(data); }
  }
  function row(k, v) { return '<div class="row"><span class="key">' + CFO.escapeHtml(k) + '</span><span class="val">' + CFO.escapeHtml(String(v == null ? '—' : v)) + '</span></div>'; }
  function kpiCard(label, value, sub, extra) {
    return '<div class="kpi ' + (extra || '') + '">'
      + '<div class="label">' + CFO.escapeHtml(label) + '</div>'
      + '<div class="value">' + CFO.escapeHtml(value) + '</div>'
      + '<div class="sub">' + CFO.escapeHtml(sub || '') + '</div>'
      + '</div>';
  }

  function drawCharts(data) {
    Chart.defaults.font.family = "Manrope, system-ui, sans-serif";
    Chart.defaults.color = "#27384A";
    Chart.defaults.borderColor = "rgba(39,56,74,0.1)";
    const colors = { slate: "#27384A", amber: "#E89B3B", sage: "#A8C9A0", red: "#b34a3a", yellow: "#c08a2b", green: "#2f7a4f" };

    // 1) Revenue stacked area
    const series = data.charts.revenue_90d || [];
    const labels = series.map(function (r) { return r.d; });
    if (charts.revenue) charts.revenue.destroy();
    charts.revenue = new Chart(document.getElementById('chart-revenue'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Subscription', data: series.map(function (r) { return (r.sub_cents || 0) / 100; }), backgroundColor: 'rgba(39,56,74,0.7)', borderColor: colors.slate, fill: true, tension: 0.25, pointRadius: 0 },
          { label: 'Sponsor', data: series.map(function (r) { return (r.sponsor_cents || 0) / 100; }), backgroundColor: 'rgba(232,155,59,0.85)', borderColor: colors.amber, fill: true, tension: 0.25, pointRadius: 0 },
          { label: 'Other revenue', data: series.map(function (r) { return (r.other_cents || 0) / 100; }), backgroundColor: 'rgba(168,201,160,0.85)', borderColor: colors.sage, fill: true, tension: 0.25, pointRadius: 0 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false,
        scales: { y: { stacked: true, ticks: { callback: function (v) { return '$' + v.toLocaleString(); } } }, x: { stacked: true, ticks: { maxTicksLimit: 8 } } },
        plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: function (ctx) { return ctx.dataset.label + ': $' + Number(ctx.parsed.y).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); } } } } }
    });
    document.getElementById('dl-revenue').onclick = function () { dl(charts.revenue, 'shg-revenue-90d.png'); };

    // 2) MRR by tier donut
    const mrr = data.charts.mrr_by_tier || [];
    const tierLabels = mrr.map(function (r) { return CFO.tierLabel(r.tier, r.founder_locked_rate); });
    const tierVals = mrr.map(function (r) { return Number(r.cents || 0) / 100; });
    const palette = [colors.slate, colors.amber, colors.sage, '#7B9CB8', '#C9A96B', '#5E7287'];
    if (charts.mrr) charts.mrr.destroy();
    charts.mrr = new Chart(document.getElementById('chart-mrr'), {
      type: 'doughnut',
      data: { labels: tierLabels.length ? tierLabels : ['No data'], datasets: [{ data: tierVals.length ? tierVals : [1], backgroundColor: palette, borderColor: '#fff', borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '62%',
        plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: function (ctx) { return ctx.label + ': $' + Number(ctx.parsed).toLocaleString('en-US', { minimumFractionDigits: 2 }); } } } } }
    });
    document.getElementById('dl-mrr').onclick = function () { dl(charts.mrr, 'shg-mrr-by-tier.png'); };

    // 3) Affiliate horizontal bar
    const aff = data.charts.top_affiliates || [];
    if (charts.aff) charts.aff.destroy();
    charts.aff = new Chart(document.getElementById('chart-aff'), {
      type: 'bar',
      data: { labels: aff.map(function (a) { return a.discord_id || a.whop_id || ('#' + a.member_id); }),
              datasets: [{ label: 'Active refs', data: aff.map(function (a) { return a.current_active_refs || 0; }), backgroundColor: colors.amber }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        scales: { x: { beginAtZero: true, ticks: { precision: 0 } } }, plugins: { legend: { display: false } } }
    });
    document.getElementById('dl-aff').onclick = function () { dl(charts.aff, 'shg-top-affiliates.png'); };

    // 4) Recon timeline (sparkline-style scatter)
    const rec = data.charts.recon_timeline || [];
    const labels2 = rec.map(function (r) { return new Date(r.ran_at).toLocaleDateString('en-US', { month: 'short', day: '2-digit' }); });
    const driftSer = rec.map(function (r) { return Math.abs(Number(r.drift_cents) || 0) / 100; });
    const ptColors = rec.map(function (r) {
      if (r.status === 'clean') return colors.green;
      if (r.status === 'drift_detected' && Math.abs(Number(r.drift_cents) || 0) > 50000) return colors.red;
      return colors.yellow;
    });
    if (charts.recon) charts.recon.destroy();
    charts.recon = new Chart(document.getElementById('chart-recon'), {
      type: 'line',
      data: { labels: labels2, datasets: [{ label: 'Abs drift ($)', data: driftSer, borderColor: colors.slate,
              pointBackgroundColor: ptColors, pointBorderColor: ptColors, pointRadius: 5, pointHoverRadius: 7, tension: 0.2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: function (v) { return '$' + v; } } } } }
    });
    document.getElementById('dl-recon').onclick = function () { dl(charts.recon, 'shg-audit-timeline.png'); };
  }

  function dl(chart, name) {
    const url = chart.toBase64Image('image/png', 1);
    const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  }

  load();
});
</script>
</html>
